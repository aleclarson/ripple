<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Ripple TS</title>
		<meta name="description" content="Ripple TS - the elegant TypeScript UI framework" />

		<!-- AI/LLM Documentation Reference -->
		<meta name="ai-documentation" content="/llms.txt" />
		<link rel="ai-documentation" href="/llms.txt" type="text/plain" />

		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://ripple-ts.com/" />
		<meta property="og:title" content="Ripple TS" />
		<meta property="og:description" content="A new way to build reactive web applications." />
		<meta property="og:image" content="/images/ripple-social.png" />

		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://ripple-ts.com/" />
		<meta property="twitter:title" content="Ripple TS" />
		<meta property="twitter:description" content="A new way to build reactive web applications." />
		<meta property="twitter:image" content="/ripple-social.png" />

		<link rel="icon" type="image/x-icon" sizes="48x48" href="/images/favicon.ico" />
		<link rel="icon" type="image/svg+xml" sizes="any" href="/images/favicon.svg" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Recursive:wght@300..1000&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--vp-c-bg: #1b1b1f;
				--vp-c-bg-alt: #161618;
				--vp-c-bg-soft: #202127;
				--vp-c-bg-elv: #252529;
				--vp-c-text-1: rgba(255, 255, 245, 0.86);
				--vp-c-text-2: rgba(235, 235, 245, 0.6);
				--vp-c-text-3: #98989f;
				--vp-c-border: #2e2e32;
				--vp-c-divider: rgba(84, 84, 84, 0.48);
				--vp-c-brand: #3e95ff;
				--vp-c-brand-light: #5aa5ff;
				--vp-c-code-bg: rgba(101, 117, 133, 0.16);
				--vp-c-code-text: #e1e4e8;
				--vp-c-scrollbar: rgba(255, 255, 255, 0.2);
				--vp-c-scrollbar-hover: rgba(255, 255, 255, 0.3);
				--vp-c-info-bg: rgba(101, 117, 133, 0.16);
				--vp-c-tip-bg: rgba(66, 184, 131, 0.16);
				--vp-c-warning-bg: rgba(234, 179, 8, 0.16);
				--vp-c-danger-bg: rgba(234, 57, 67, 0.16);
				--vp-c-aside-gradient-start: transparent;
				--vp-c-aside-gradient-end: #1b1b1f;
				color-scheme: dark;
			}

			html[data-theme='light'] {
				--vp-c-bg: #ffffff;
				--vp-c-bg-alt: #f6f6f7;
				--vp-c-bg-soft: #f1f1f2;
				--vp-c-bg-elv: #ffffff;
				--vp-c-text-1: rgba(60, 60, 67);
				--vp-c-text-2: rgba(60, 60, 67, 0.78);
				--vp-c-text-3: rgba(60, 60, 67, 0.56);
				--vp-c-border: #e2e2e3;
				--vp-c-divider: #e2e2e3;
				--vp-c-brand: #3451b2;
				--vp-c-brand-light: #3a5ccc;
				--vp-c-code-bg: rgba(101, 117, 133, 0.12);
				--vp-c-code-text: #383a42;
				--vp-c-scrollbar: rgba(0, 0, 0, 0.15);
				--vp-c-scrollbar-hover: rgba(0, 0, 0, 0.25);
				--vp-c-info-bg: rgba(101, 117, 133, 0.12);
				--vp-c-tip-bg: rgba(66, 184, 131, 0.14);
				--vp-c-warning-bg: rgba(234, 179, 8, 0.14);
				--vp-c-danger-bg: rgba(234, 57, 67, 0.14);
				--vp-c-aside-gradient-start: transparent;
				--vp-c-aside-gradient-end: #ffffff;
				color-scheme: light;
			}
		</style>
		<script>
			(function () {
				var saved = localStorage.getItem('vitepress-theme-appearance');
				if (
					saved === 'light' ||
					(!saved && window.matchMedia('(prefers-color-scheme: light)').matches)
				) {
					document.documentElement.setAttribute('data-theme', 'light');
				}
			})();
		</script>
		<!--ssr-head-->
	</head>

	<body>
		<div id="root"><!--ssr-body--></div>
	</body>
</html>
